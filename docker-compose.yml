services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: control
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env
    environment:
      # در compose hostname سرویس postgres است
      CONTROL_DATABASE_URL: ${CONTROL_DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/control?schema=public}
      POSTGRES_ADMIN_URL: ${POSTGRES_ADMIN_URL:-postgresql://postgres:postgres@postgres:5432/postgres?schema=public}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      API_PORT: ${API_PORT:-3001}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-86400}
    depends_on:
      - postgres
      - redis
    ports:
      - "3001:3001"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3001/api/v1}
      WEB_PORT: ${WEB_PORT:-3000}
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  pg_data:
    name: accounting_pg_data
